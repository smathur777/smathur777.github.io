<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snake</title>
    <style>
        :root {
            --bg: #000000;
            --text: #f3f3f3;
            --link: #ffffff;
            --border: #3f3f3f;
            --panel: #090909;
            --button-bg: #161616;
            --input-bg: #111111;
            --canvas-bg: #101820;
        }

        body {
            margin: 0;
            padding: 24px 16px;
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", Courier, monospace;
        }

        body.light-mode {
            --bg: #ffffff;
            --text: #111111;
            --link: #111111;
            --border: #bdbdbd;
            --panel: #f4f4f4;
            --button-bg: #e8e8e8;
            --input-bg: #ffffff;
            --canvas-bg: #dfe8ef;
        }

        main {
            max-width: 740px;
            margin: 0 auto;
        }

        a {
            color: var(--link);
        }

        .frame {
            padding: 16px;
            border: 1px solid var(--border);
            background: var(--panel);
        }

        .hud {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 600px;
            height: auto;
            border: 1px solid var(--border);
            background: var(--canvas-bg);
            image-rendering: pixelated;
            touch-action: none;
        }

        button {
            margin-top: 12px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--button-bg);
            color: var(--text);
            font: inherit;
            cursor: pointer;
        }

        ol {
            margin: 14px 0 0;
            padding-left: 24px;
        }

        li {
            margin: 6px 0;
        }

        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 64px);
            gap: 8px;
            width: max-content;
            margin-top: 14px;
        }

        .mobile-controls button {
            margin-top: 0;
            min-height: 48px;
            font-size: 20px;
        }

        .spacer {
            visibility: hidden;
        }

        .leaderboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .leaderboard-header h2 {
            margin: 0;
        }

        .leaderboard-header button {
            margin-top: 0;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .name-row input {
            padding: 8px 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font: inherit;
            min-width: 220px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .home-link {
            margin: 0;
        }
    </style>
</head>
<body>
    <main>
        <div class="topbar">
            <p class="home-link"><a href="../">home</a></p>
            <button id="theme-toggle" type="button">light mode</button>
        </div>
        <h1>snake</h1>
        <div class="frame">
            <div class="name-row">
                <label for="player-name">username</label>
                <input id="player-name" type="text" maxlength="16" placeholder="enter username">
                <button id="save-name" type="button">save</button>
            </div>
            <div class="hud">
                <div id="score">score: 0</div>
                <div id="message">arrow keys or wasd to move</div>
            </div>
            <canvas id="game" width="600" height="400" aria-label="Snake game"></canvas>
            <button id="restart" type="button">restart</button>
            <div class="mobile-controls" aria-label="mobile controls">
                <div class="spacer"></div>
                <button id="up" type="button" aria-label="move up">↑</button>
                <div class="spacer"></div>
                <button id="left" type="button" aria-label="move left">←</button>
                <button id="down" type="button" aria-label="move down">↓</button>
                <button id="right" type="button" aria-label="move right">→</button>
            </div>
            <div class="leaderboard-header">
                <h2>leaderboard</h2>
                <button id="reset-leaderboard" type="button">reset leaderboard</button>
            </div>
            <ol id="leaderboard"></ol>
        </div>
    </main>
    <script src="../theme.js"></script>
    <script src="./config.js"></script>
    <script src="./snake.js"></script>
</body>
</html>
