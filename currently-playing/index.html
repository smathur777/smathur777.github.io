<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currently playing</title>
    <style>
        :root {
            --bg: #000000;
            --text: #f3f3f3;
            --link: #ffffff;
            --border: #3f3f3f;
            --panel: #090909;
            --art-bg: #111111;
            --button-bg: #161616;
        }

        body {
            margin: 0;
            padding: 24px 16px;
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", Courier, monospace;
        }

        body.light-mode {
            --bg: #ffffff;
            --text: #111111;
            --link: #111111;
            --border: #bdbdbd;
            --panel: #f4f4f4;
            --art-bg: #f0f0f0;
            --button-bg: #e8e8e8;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
        }

        a {
            color: var(--link);
        }

        .frame {
            margin-top: 18px;
            padding: 16px;
            border: 1px solid var(--border);
            background: var(--panel);
        }

        .content {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .art {
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 1px solid var(--border);
            background: var(--art-bg);
        }

        .meta {
            margin-top: 14px;
        }

        .meta p {
            margin: 8px 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .home-link {
            margin: 0;
        }

        button {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--button-bg);
            color: var(--text);
            font: inherit;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <div class="topbar">
            <p class="home-link"><a href="../">home</a></p>
            <button id="theme-toggle" type="button">light mode</button>
        </div>
        <h1>currently playing</h1>
        <div class="frame">
            <div class="content">
                <img id="art" class="art" alt="album art" hidden>
                <div class="meta">
                    <p id="status">loading...</p>
                    <p id="track"></p>
                    <p id="artist"></p>
                    <p id="album"></p>
                    <p id="updated"></p>
                    <p id="open-link"></p>
                </div>
            </div>
        </div>
    </main>
    <script src="../theme.js"></script>
    <script src="./config.js"></script>
    <script src="./currently-playing.js"></script>
</body>
</html>
