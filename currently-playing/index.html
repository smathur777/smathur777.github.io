<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currently playing</title>
    <style>
        body {
            margin: 0;
            padding: 24px 16px;
            background: #000000;
            color: #f3f3f3;
            font-family: "Courier New", Courier, monospace;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
        }

        a {
            color: #8ff0a4;
        }

        .frame {
            margin-top: 18px;
            padding: 16px;
            border: 1px solid #3f3f3f;
            background: #090909;
        }

        .art {
            display: block;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 1px solid #3f3f3f;
            background: #111111;
        }

        .meta {
            margin-top: 14px;
        }

        .meta p {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <main>
        <p><a href="../">home</a></p>
        <h1>currently playing</h1>
        <div class="frame">
            <img id="art" class="art" alt="album art" hidden>
            <div class="meta">
                <p id="status">loading...</p>
                <p id="track"></p>
                <p id="artist"></p>
                <p id="album"></p>
                <p id="updated"></p>
                <p id="open-link"></p>
            </div>
        </div>
    </main>
    <script src="./currently-playing.js"></script>
</body>
</html>
