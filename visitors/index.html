<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>visits</title>
    <style>
        :root {
            --bg: #000000;
            --text: #f3f3f3;
            --link: #ffffff;
            --border: #3f3f3f;
            --panel: #090909;
            --button-bg: #161616;
        }

        body {
            margin: 0;
            padding: 24px 16px;
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", Courier, monospace;
        }

        body.light-mode {
            --bg: #ffffff;
            --text: #111111;
            --link: #111111;
            --border: #bdbdbd;
            --panel: #f4f4f4;
            --button-bg: #e8e8e8;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
        }

        a {
            color: var(--link);
        }

        .frame {
            margin-top: 18px;
            padding: 16px;
            border: 1px solid var(--border);
            background: var(--panel);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            padding: 8px;
            border: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }

        button {
            margin-top: 12px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--button-bg);
            color: var(--text);
            font: inherit;
            cursor: pointer;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .home-link {
            margin: 0;
        }

    </style>
</head>
<body>
    <main>
        <div class="topbar">
            <p class="home-link"><a href="../">home</a></p>
            <button id="theme-toggle" type="button">light mode</button>
        </div>
        <h1>visits</h1>

        <div class="frame">
            <h2>what this browser saved</h2>
            <p id="summary">loading...</p>
            <table>
                <thead>
                    <tr>
                        <th>time</th>
                        <th>page</th>
                        <th>details</th>
                    </tr>
                </thead>
                <tbody id="visit-log"></tbody>
            </table>
            <button id="clear-log" type="button">clear this browser log</button>
        </div>
    </main>
    <script src="../theme.js"></script>
    <script src="./visitors.js"></script>
</body>
</html>
