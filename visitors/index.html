<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>visits</title>
    <style>
        body {
            margin: 0;
            padding: 24px 16px;
            background: #000000;
            color: #f3f3f3;
            font-family: "Courier New", Courier, monospace;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
        }

        a {
            color: #8ff0a4;
        }

        .frame {
            margin-top: 18px;
            padding: 16px;
            border: 1px solid #3f3f3f;
            background: #090909;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            padding: 8px;
            border: 1px solid #3f3f3f;
            text-align: left;
            vertical-align: top;
        }

        button {
            margin-top: 12px;
            padding: 8px 12px;
            border: 1px solid #3f3f3f;
            background: #161616;
            color: #f3f3f3;
            font: inherit;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <main>
        <p><a href="../">home</a></p>
        <h1>visits</h1>

        <div class="frame">
            <h2>what this browser saved</h2>
            <p id="summary">loading...</p>
            <table>
                <thead>
                    <tr>
                        <th>time</th>
                        <th>page</th>
                        <th>details</th>
                    </tr>
                </thead>
                <tbody id="visit-log"></tbody>
            </table>
            <button id="clear-log" type="button">clear this browser log</button>
        </div>
    </main>
    <script src="./visitors.js"></script>
</body>
</html>
