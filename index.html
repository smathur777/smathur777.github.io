<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sameer mathur</title>
    <style>
        :root {
            --bg: #000000;
            --text: #f4f4f4;
            --link: #ffffff;
            --border: #3f3f3f;
            --panel: #090909;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: "Times New Roman", Times, serif;
        }

        body.light-mode {
            --bg: #ffffff;
            --text: #111111;
            --link: #111111;
            --border: #bdbdbd;
            --panel: #f4f4f4;
        }

        main {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 18px;
        }

        h1, h2 {
            font-weight: normal;
        }

        a {
            color: var(--link);
        }

        .box {
            margin-top: 24px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            background: var(--panel);
        }

        .box h2 {
            margin-top: 0;
        }

        .box > :last-child {
            margin-bottom: 0;
        }

        ul {
            padding-left: 20px;
            margin-bottom: 0;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
        }

        button {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            font: inherit;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <div class="topbar">
            <button id="theme-toggle" type="button">light mode</button>
        </div>
        <header>
            <h1>hi, my name's sameer mathur</h1>
            <p>computer engineering &amp; economics @ university of maryland</p>
        </header>

        <section class="box">
            <h2>stuff</h2>
            <ul>
                <li><a href="./snake/">play my snake game</a></li>
                <li><a href="./visitors/">visits</a></li>
                <li><a href="./currently-playing/">currently playing</a></li>
            </ul>
        </section>

        <section class="box">
            <h2>find me</h2>
            <ul>
                <li><a href="https://www.linkedin.com/in/sameermathur077" target="_blank" rel="noreferrer">linkedin</a></li>
                <li><a href="mailto:smathur7789@gmail.com">e-mail</a></li>
            </ul>
        </section>
    </main>
    <script src="./theme.js"></script>
</body>
</html>
